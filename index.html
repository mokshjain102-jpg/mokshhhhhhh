<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroVision AI</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f0f4f3;
}

/* NAVBAR */
header {
  background: #1b5e20;
  color: white;
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
}

nav a {
  color: white;
  margin: 10px;
  text-decoration: none;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px;
  background: linear-gradient(to right, #43a047, #66bb6a);
  color: white;
}

.hero button {
  padding: 15px 25px;
  background: #0d3b12;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

/* FEATURES */
.features {
  display: flex;
  justify-content: space-around;
  padding: 40px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* DEMO */
.demo {
  text-align: center;
  padding: 40px;
}

/* LOGIN */
.login-box {
  display: none;
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* DASHBOARD */
.dashboard {
  display: none;
  padding: 40px;
}

.stats {
  display: flex;
  gap: 20px;
}

.stat {
  background: #2e7d32;
  color: white;
  padding: 20px;
  border-radius: 10px;
  flex: 1;
}

/* BUTTON */
button {
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h2>🌱 AgroVision</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#" onclick="openLogin()">Login</a>
    <a href="#" onclick="showDashboard()">Dashboard</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero">
  <h1>AI Crop Disease Detection</h1>
  <p>Upload leaf → get instant AI diagnosis</p>
  <button onclick="scrollToDemo()">📸 Scan Crop</button>
</div>

<!-- FEATURES -->
<div class="features">
  <div class="card">🌿 Disease Detection</div>
  <div class="card">📊 Severity</div>
  <div class="card">🌦 Weather Risk</div>
  <div class="card">💊 Treatment</div>
</div>

<!-- DEMO -->
<div class="demo" id="demo">
  <h2>Live Demo</h2>
  <input type="file" onchange="analyze()">
  <p id="output"></p>
</div>

<!-- LOGIN BOX -->
<div class="login-box" id="loginBox">
  <h3>Login</h3>
  <input type="text" placeholder="Username"><br><br>
  <input type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <h2>📊 Dashboard</h2>

  <div class="stats">
    <div class="stat">Total Scans: 120</div>
    <div class="stat">Diseases Found: 35</div>
    <div class="stat">Healthy Crops: 85</div>
  </div>

  <h3>📸 Scan History</h3>
  <ul id="history"></ul>
</div>

<script>

let historyList = [];

function analyze() {
  let result = "🌿 Early Blight (92%) - Use fungicide";
  document.getElementById("output").innerHTML = result;

  historyList.push(result);
  updateHistory();

  // Voice Hindi
  let msg = new SpeechSynthesisUtterance("Aapki fasal mein disease detect hui hai");
  msg.lang = "hi-IN";
  speechSynthesis.speak(msg);
}

function updateHistory() {
  let list = document.getElementById("history");
  list.innerHTML = "";
  historyList.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item;
    list.appendChild(li);
  });
}

function openLogin() {
  document.getElementById("loginBox").style.display = "block";
}

function login() {
  alert("Login Successful");
  document.getElementById("loginBox").style.display = "none";
}

function showDashboard() {
  document.getElementById("dashboard").style.display = "block";
}

function scrollToDemo() {
  document.getElementById("demo").scrollIntoView({ behavior: "smooth" });
}

</script>

</body>
</html>
